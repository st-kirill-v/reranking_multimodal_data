experiment_name: docbench_hybrid_bm25_tools
results_root: results
seed: 42
routing_mode: by_official_type
prompt_profile: docbench_hybrid_v1

dataset:
  name: docbench
  split: all_official_types
  subset: text-only,meta-data,multimodal-t,multimodal-f
  types: ["all"]
  data_dir: data/datasets/docbench

evaluation:
  evaluator: hybrid_bm25
  adaptive_policy: text_top3_visual_top5
  text_top_pages: 3
  visual_top_pages: 5

text_pipeline:
  text_retriever: bm25
  text_index_dir: data/indexes/docbench_bm25
  text_top_k: 5
  text_context_max_chars: 12000
  enable_text_tools: true

retrieval:
  mode: colpali_colvision_multivector
  model_id: vidore/colpali-v1.3-merged
  index_dir: index_colpali_v1_3_merged
  index_name: pages_colpali_v1_3_merged_clean
  first_stage_top_k: 30

reranking:
  mode: nemotron_vl_cross_encoder
  model_id: nvidia/llama-nemotron-rerank-vl-1b-v2
  top_k: 10
  batch_size: 1
  max_input_tiles: 6
  max_length: 2048

generation:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  prompt_style: concise
  prompt_profile: docbench_hybrid_v1
  max_new_tokens: 192
  max_context_images: 5
  max_image_long_edge: 1600
  do_sample: false
  no_4bit: false
  answer_refine: none

cropping:
  crop_policy: layout_aware_v2
  visual_crop_policy: layout_aware_v2
  context_mode: full_page_plus_crop
  layout_context_mode: full_page_plus_crop
  debug_crop_dir: data/debug_crops/docbench_hybrid_bm25

output:
  directory: results/docbench_hybrid_bm25_tools
