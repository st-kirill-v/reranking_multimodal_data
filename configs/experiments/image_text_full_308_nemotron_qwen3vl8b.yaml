experiment_name: image_text_full_308_nemotron_qwen3vl8b
results_root: results
seed: 42

dataset:
  name: docbench
  split: multimodal_308
  subset: multimodal-t,multimodal-f
  types: ["multimodal-t", "multimodal-f"]
  data_dir: data/datasets/docbench

evaluation:
  evaluator: full_pipeline
  adaptive_policy: text_top3_visual_top5
  text_top_pages: 3
  visual_top_pages: 5

retrieval:
  mode: nemotron_image
  backend: nemotron_image
  model_id: models/nemotron/embed-vl-1b-v2
  index_dir: index
  index_name: nemotron
  device: cuda
  first_stage_top_k: 30

reranking:
  mode: nemotron_text_image
  model_id: nvidia/llama-nemotron-rerank-vl-1b-v2
  top_k: 10
  device: cuda
  batch_size: 2
  max_input_tiles: 6
  max_length: 2048
  text_source_fields: ["table_text", "caption", "page_text", "ocr"]
  text_max_chars: 4096

fusion:
  mode: none

generation:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  device: cuda
  prompt_style: concise
  prompt_profile: docbench_hybrid_v1
  max_new_tokens: 192
  max_context_images: 5
  max_image_long_edge: 1600
  do_sample: false
  no_4bit: false
  answer_refine: none
  vlm_text_context:
    mode: selected_pages
    source_fields: ["table_text", "caption", "page_text", "ocr"]
    max_chars: 24000

cropping:
  crop_policy: layout_aware_v2
  visual_crop_policy: layout_aware_v2
  context_mode: full_page_plus_crop
  layout_context_mode: full_page_plus_crop
  debug_crop_dir: data/debug_crops/image_text_full_308_nemotron_qwen3vl8b

output:
  directory: results/image_text_full_308_nemotron_qwen3vl8b
