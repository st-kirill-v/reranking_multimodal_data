experiment_name: full_colpali_layout_aware
results_root: results
dataset:
  name: docbench
  data_dir: data/datasets/docbench
evaluation:
  evaluator: full_pipeline
  adaptive_policy: text_top3_visual_top5
  text_top_pages: 3
  visual_top_pages: 5
retrieval:
