  first_stage_top_k: 30
reranking:
  model_id: nvidia/llama-nemotron-rerank-vl-1b-v2
  top_k: 10
generation:
  model_id: Qwen/Qwen3-VL-8B-Instruct
  prompt_style: concise
  no_4bit: false
cropping:
  visual_crop_policy: layout_aware_v2
  layout_context_mode: full_page_plus_crop
  debug_crop_dir: data/debug_crops/full_pipeline_layout_aware_v2
