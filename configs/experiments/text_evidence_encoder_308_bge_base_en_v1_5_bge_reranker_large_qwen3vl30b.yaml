experiment_name: text_evidence_encoder_308_bge_base_en_v1_5_bge_reranker_large_qwen3vl30b
results_root: results
seed: 42

dataset:
  name: docbench
  split: multimodal_308
  subset: multimodal-t,multimodal-f
  types: ["multimodal-t", "multimodal-f"]
  data_dir: data/datasets/docbench

evaluation:
  evaluator: text_reranker_308
  text_top_pages: 5

retrieval:
  mode: text_encoder
  backend: text_encoder
  model_id: BAAI/bge-base-en-v1.5
  index_dir: data/indexes/docbench_text_evidence_bge_base_en_v1_5
  device: cuda
  batch_size: 32
  max_length: 512
  normalize: true
  first_stage_top_k: 30

reranking:
  mode: text_cross_encoder
  backend: cross_encoder
  model_id: BAAI/bge-reranker-large
  device: cuda
  top_k: 10
  batch_size: 4
  max_length: 512
  trust_remote_code: true

text_pipeline:
  source_fields: ["ocr", "page_text", "caption", "table_text"]
  context_top_pages: 5
  text_context_max_chars: 32000

generation:
  model_id: openai/qwen3-vl-30b
  prompt_profile: docbench_hybrid_v1
  multimodal_generation_backend: openai_compatible_vlm
  max_new_tokens: 192
  openai_vlm:
    base_url: "http://10.32.15.88:4000/v1"
    model: "openai/qwen3-vl-30b"
    api_key_env: "OPENAI_COMPAT_API_KEY"
    temperature: 0
    max_tokens: 192
    timeout: 180

output:
  directory: results/text_evidence_encoder_308_bge_base_en_v1_5_bge_reranker_large_qwen3vl30b
