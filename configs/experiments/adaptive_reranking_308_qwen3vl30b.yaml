experiment_name: adaptive_reranking_308_qwen3vl30b
results_root: results
seed: 42

dataset:
  name: docbench
  split: multimodal_308
  subset: multimodal-t,multimodal-f
  types: ["multimodal-t", "multimodal-f"]
  data_dir: data/datasets/docbench

evaluation:
  evaluator: full_pipeline
  adaptive_policy: text_top3_visual_top5
  text_top_pages: 3
  visual_top_pages: 5

retrieval:
  mode: nemotron_image
  backend: nemotron_image
  model_id: models/nemotron/embed-vl-1b-v2
  index_dir: index
  index_name: nemotron
  device: cuda
  first_stage_top_k: 30

reranking:
  mode: adaptive
  model_id: nvidia/llama-nemotron-rerank-vl-1b-v2
  top_k: 10
  device: cuda
  batch_size: 2
  max_input_tiles: 6
  max_length: 2048
  text_source_fields: ["table_text", "caption", "page_text", "ocr"]
  text_max_chars: 4096

adaptive_reranking:
  high_confidence_strategy: no_reranker
  threshold_top1: null
  threshold_gap: 0.10

fusion:
  mode: none

generation:
  model_id: openai/qwen3-vl-30b
  device: cuda
  prompt_style: concise
  prompt_profile: docbench_hybrid_v1
  multimodal_generation_backend: openai_compatible_vlm
  max_new_tokens: 192
  max_context_images: 5
  max_image_long_edge: 1600
  do_sample: false
  no_4bit: false
  answer_refine: none
  vlm_text_context:
    mode: selected_pages
    source_fields: ["table_text", "caption", "page_text", "ocr"]
    max_chars: 24000
  openai_vlm:
    base_url: "http://10.32.15.88:4000/v1"
    model: "openai/qwen3-vl-30b"
    api_key_env: "OPENAI_COMPAT_API_KEY"
    temperature: 0
    max_tokens: 192
    timeout: 180

cropping:
  crop_policy: layout_aware_v2
  visual_crop_policy: layout_aware_v2
  context_mode: full_page_plus_crop
  layout_context_mode: full_page_plus_crop
  debug_crop_dir: data/debug_crops/adaptive_reranking_308_qwen3vl30b

output:
  directory: results/adaptive_reranking_308_qwen3vl30b
